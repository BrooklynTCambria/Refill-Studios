<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Refill Studios - Sign Up</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="left">
        <img src="images/Logo.png" alt="Logo Icon" class="logo">
        <img src="images/Title.png" alt="Refill Studios Title" class="title-img">
      </div>
      <div class="right">
        <!-- Will be populated by JavaScript -->
      </div>
    </header>

    <nav>
      <button id="index-button" class="nav-btn">HOME</button>
      <button id="games-button" class="nav-btn">GAMES</button>
      <button id="updates-button" class="nav-btn">UPDATES</button>
    </nav>
    
    <main>
      <div class="account-area">
        <h2><u>SIGN UP</u></h2>
        <br><br>
        <p>Email</p>
        <input class="input-box" id="email-input" placeholder="Example@gmail.com">
        <br><br><br>
        <p>Create Username</p>
        <input class="input-box" id="username-input" placeholder="Username">        
        <br><br><br>
        <p>Password</p>
        <input type="password" class="input-box" id="password-input" placeholder="Password">
        <br><br><br>
        <p>Confirm Password</p>
        <input type="password" class="input-box" id="confirm-password-input" placeholder="Password">
        <br><br><br>
        <button id="register-button" class="account-button">REGISTER</button>
        <br><br><br>
        <p class="small-paragraph">Already have an account? click <b class="account-link" id="account-link-here">Here</b></p>
      </div>
    </main>
  </div>

  <script src="accountManager.js"></script>
</body>
</html>
